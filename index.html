<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMSTUDIO Photography | Coming Soon</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    background: #0a0a0a;
    color: #fff;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}

/* Background glow */
body::before {
    content: "";
    position: absolute;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(255,255,255,0.08), transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

/* Main container */
.container {
    text-align: center;
    max-width: 600px;
    padding: 20px;
    z-index: 2;
}

/* Logo */
.logo {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 2px;
    margin-bottom: 20px;
}

/* Heading */
h1 {
    font-size: 40px;
    font-weight: 600;
    margin-bottom: 15px;
}

/* Subtext */
p {
    font-size: 16px;
    color: #bbb;
    margin-bottom: 30px;
}

/* Loader animation */
.loader {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 30px;
}

.loader span {
    width: 10px;
    height: 10px;
    background: #fff;
    border-radius: 50%;
    animation: bounce 1.2s infinite ease-in-out;
}

.loader span:nth-child(2) {
    animation-delay: 0.2s;
}
.loader span:nth-child(3) {
    animation-delay: 0.4s;
}

@keyframes bounce {
    0%, 80%, 100% {
        transform: scale(0);
        opacity: 0.5;
    }
    40% {
        transform: scale(1);
        opacity: 1;
    }
}

/* Contact section */
.contact {
    margin-top: 20px;
}

.contact a {
    display: inline-block;
    margin: 8px;
    padding: 10px 18px;
    border: 1px solid #fff;
    border-radius: 30px;
    text-decoration: none;
    color: #fff;
    font-size: 14px;
    transition: 0.3s;
}

.contact a:hover {
    background: #fff;
    color: #000;
}

/* Footer */
footer {
    position: absolute;
    bottom: 20px;
    font-size: 13px;
    color: #777;
}

/* Mobile */
@media(max-width: 600px) {
    h1 {
        font-size: 28px;
    }

    p {
        font-size: 14px;
    }

    .contact a {
        padding: 8px 14px;
        font-size: 12px;
    }
}
</style>
</head>

<body>

<div class="container">
    
    <!-- Replace with your logo image if you want -->
    <div class="logo">CMSTUDIO</div>

    <h1>Website Coming Soon</h1>

    <p>
        We’re currently building something beautiful and powerful for you.  
        Stay tuned.  CMSTUDIO Photography is launching soon.
    </p>

    <div class="loader">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <div class="contact">
        <a href="tel:+27818401398">Call Us</a>
        <a href="mailto:cmstudiosza@gmail.com">Email</a>
        <a href="https://wa.me/27818401398" target="_blank">WhatsApp</a>
    </div>

</div>

<footer>
    © 2026 CMSTUDIO Photography. All rights reserved.
</footer>

</body>
</html>
