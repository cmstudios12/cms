<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMSTUDIO Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Poppins;
}

body{
  background:#000;
  color:#fff;
}

/* HEADER */
header{
  padding:40px 8%;
  text-align:center;
}

header h1{
  font-size:3rem;
  letter-spacing:5px;
}

header p{
  color:#aaa;
  margin-top:10px;
}

/* FILTER BUTTONS */
.filters{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:15px;
  margin:30px 0;
}

.filters button{
  padding:10px 18px;
  border:1px solid #333;
  background:transparent;
  color:#fff;
  cursor:pointer;
  border-radius:30px;
  transition:0.3s;
}

.filters button.active,
.filters button:hover{
  background:#fff;
  color:#000;
}

/* GALLERY GRID */
.grid{
  padding:0 8% 80px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.item{
  position:relative;
  overflow:hidden;
  border-radius:20px;
  cursor:pointer;
}

.item img{
  width:100%;
  height:100%;
  display:block;
  transition:0.4s;
}

.item:hover img{
  transform:scale(1.1);
}

/* LIGHTBOX */
.lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.lightbox img{
  max-width:90%;
  max-height:90%;
  border-radius:10px;
}

.close{
  position:absolute;
  top:20px;
  right:30px;
  font-size:2rem;
  cursor:pointer;
}

/* HIDE FILTER */
.hide{
  display:none;
}

/* RESPONSIVE */
@media(max-width:600px){
  header h1{
    font-size:2rem;
  }
}
</style>
</head>

<body>

<header>
  <h1>Portfolio</h1>
  <p>Graduation • Portraits • Street • Events</p>
</header>

<!-- FILTERS -->
<div class="filters">
  <button class="active" onclick="filter('all')">All</button>
  <button onclick="filter('graduation')">Graduation</button>
  <button onclick="filter('portrait')">Portrait</button>
  <button onclick="filter('street')">Street</button>
  <button onclick="filter('events')">Events</button>
</div>

<!-- GALLERY -->
<div class="grid">

  <!-- GRADUATION -->
  <div class="item graduation">
    <img src="grad1.jpg" onclick="openLightbox(this)">
  </div>

  <div class="item graduation">
    <img src="grad2.jpg" onclick="openLightbox(this)">
  </div>

  <!-- PORTRAIT -->
  <div class="item portrait">
    <img src="portrait1.jpg" onclick="openLightbox(this)">
  </div>

  <div class="item portrait">
    <img src="portrait2.jpg" onclick="openLightbox(this)">
  </div>

  <!-- STREET -->
  <div class="item street">
    <img src="street1.jpg" onclick="openLightbox(this)">
  </div>

  <div class="item street">
    <img src="street2.jpg" onclick="openLightbox(this)">
  </div>

  <!-- EVENTS -->
  <div class="item events">
    <img src="event1.jpg" onclick="openLightbox(this)">
  </div>

  <div class="item events">
    <img src="event2.jpg" onclick="openLightbox(this)">
  </div>

</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <span class="close">&times;</span>
  <img id="lightboxImg">
</div>

<script>

// FILTER SYSTEM
function filter(category){
  let items = document.querySelectorAll('.item');

  items.forEach(item=>{
    if(category === 'all'){
      item.classList.remove('hide');
    } else {
      item.classList.contains(category)
        ? item.classList.remove('hide')
        : item.classList.add('hide');
    }
  });

  document.querySelectorAll('.filters button').forEach(btn=>{
    btn.classList.remove('active');
  });

  event.target.classList.add('active');
}

// LIGHTBOX
function openLightbox(img){
  document.getElementById('lightbox').style.display = 'flex';
  document.getElementById('lightboxImg').src = img.src;
}

function closeLightbox(){
  document.getElementById('lightbox').style.display = 'none';
}

</script>

</body>
</html>
